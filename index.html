
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050505">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/512/fantasy.png">
    <title>Mythos Engine | Dark Fantasy TTRPG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&family=Pirata+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --obsidian: #050505;
            --blood: #4a0404;
            --iron: #1a1a1a;
            --gold: #b28a48;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--obsidian);
            color: #d1d5db;
            background-image: 
                radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.8) 100%),
                url('https://www.transparenttextures.com/patterns/dark-leather.png');
            overscroll-behavior-y: none;
            margin: 0;
            padding: 0;
            height: 100svh;
            width: 100vw;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        #root {
            height: 100%;
            width: 100%;
        }
        h1, h2, h3, .fantasy-font {
            font-family: 'Cinzel', serif;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .runic-border {
            border: 1px solid rgba(178, 138, 72, 0.2);
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        .grim-card {
            background: linear-gradient(145deg, #0a0a0a, #151515);
            border: 1px solid #222;
            position: relative;
            overflow: hidden;
        }
        .grim-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
            opacity: 0.05;
            pointer-events: none;
        }
        .ember-glow:hover {
            box-shadow: 0 0 10px rgba(178, 138, 72, 0.3);
            border-color: var(--gold);
        }
        
        /* Custom "Living Obsidian" Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(178, 138, 72, 0.2);
            border-radius: 10px;
            border: 1px solid rgba(178, 138, 72, 0.1);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(178, 138, 72, 0.5);
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        @keyframes slide-in {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .animate-notification {
            animation: slide-in 0.3s ease-out forwards;
        }
        
        /* Mobile Touch Optimizations */
        @media (max-width: 768px) {
            button {
                min-height: 44px; /* Standard touch target height */
            }
            input, select, textarea {
                font-size: 16px !important; /* Prevent iOS auto-zoom on focus */
            }
            /* Thicker scrollbar thumb for mobile touch */
            ::-webkit-scrollbar {
                width: 4px;
            }
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "@google/genai": "https://esm.sh/@google/genai@1.3.1",
    "peerjs": "https://esm.sh/peerjs@1.5.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "vite": "https://esm.sh/vite@^7.3.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
